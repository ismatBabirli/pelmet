name: Pelmet
options:
  bundleIdPrefix: com.ismatbabirli
  deploymentTarget:
    macOS: "13.0"

# Sparkle powers in-app auto-updates. It's embedded in the .app bundle by this
# XcodeGen build only — NOT in Package.swift — so `swift run` and the tests stay
# Sparkle-free. The updater code is guarded by `#if canImport(Sparkle)` and only
# works from a signed bundle, so leaving it out of the SPM build is intentional.
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  # Pure geometry/classification, mirrored from Package.swift so
  # `import PelmetCore` resolves in the Xcode build too.
  PelmetCore:
    type: library.static
    platform: macOS
    sources:
      - Sources/PelmetCore
    settings:
      base:
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_VERSION: "5.0"

  Pelmet:
    type: application
    platform: macOS
    dependencies:
      - target: PelmetCore
      - package: Sparkle
    sources:
      - Sources/Pelmet
      - Resources/Assets.xcassets
      # Offline source of truth for the post-update What's New window.
      - path: CHANGELOG.md
        buildPhase: resources
    info:
      path: Sources/Pelmet/Info.plist
      properties:
        CFBundleDisplayName: Pelmet
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "13.0"
        # Menu-bar-only app: no Dock icon, no app switcher entry.
        LSUIElement: true
        NSHumanReadableCopyright: "MIT License"
        # Sparkle auto-updates. The feed lives on GitHub Pages; update .zips are
        # served from GitHub Releases (see the enclosure URLs in appcast.xml).
        SUFeedURL: "https://ismatbabirli.github.io/pelmet/appcast.xml"
        # EdDSA (ed25519) public key that verifies every downloaded update.
        # Its private half lives only in the SPARKLE_ED_PRIVATE_KEY CI secret
        # and the login Keychain. See docs/RELEASING.md → "Sparkle auto-updates".
        SUPublicEDKey: "PNXQ+qmeChvGLPr2kXxFLXC6U9mwjbQTlJo5RHA3eSU="
        # SUEnableAutomaticChecks is intentionally unset: Sparkle asks the user
        # once on first launch whether to check automatically (trust-first).
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ismatbabirli.Pelmet
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        # Swift 5 language mode, matching Package.swift's swiftLanguageModes.
        SWIFT_VERSION: "5.0"
        ENABLE_HARDENED_RUNTIME: true
        # App Sandbox intentionally OFF for now; distribute outside
        # the Mac App Store (GitHub Releases + Homebrew cask).
        ENABLE_APP_SANDBOX: false
        # Empty hardened-runtime entitlements (see the file's comment).
        CODE_SIGN_ENTITLEMENTS: Sources/Pelmet/Pelmet.entitlements
        # Ad-hoc by default so anyone can `xcodegen generate` and build
        # locally with no certificate. The release workflow re-signs the
        # built .app with a real "Developer ID Application" identity before
        # notarizing — see .github/workflows/release.yml.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
