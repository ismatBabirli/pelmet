# Dependabot keeps the GitHub Actions we pin up to date. Pelmet itself has no
# third-party Swift dependencies, so there is no swift/SwiftPM ecosystem here —
# add one if that ever changes.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
