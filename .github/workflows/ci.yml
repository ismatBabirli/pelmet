name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only ever needs to read the repo.
permissions:
  contents: read

# A newer push to the same ref cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast loop: the SwiftPM build plus the PelmetCore test suite.
  build-and-test:
    name: swift build & test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain versions
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  # Catches breakage that only shows up in the real .app bundle
  # (Info.plist, asset catalog, entitlements) which `swift build` never touches.
  xcode-build:
    name: xcodegen & xcodebuild
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build app bundle (unsigned)
        run: |
          xcodebuild build \
            -project Pelmet.xcodeproj \
            -scheme Pelmet \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
