name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**', 'LICENSE', '.github/ISSUE_TEMPLATE/**', '.github/FUNDING.yml', '.github/CODEOWNERS']
  pull_request:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**', 'LICENSE', '.github/ISSUE_TEMPLATE/**', '.github/FUNDING.yml', '.github/CODEOWNERS']

# Least privilege: CI only ever needs to read the repo.
permissions:
  contents: read

# A newer push to the same ref cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast loop: the PelmetCore test suite. `swift test` builds what it needs;
  # the xcode-build job below is the authoritative "the app compiles" check.
  test:
    name: swift test
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Cache SwiftPM build
        uses: actions/cache@v6
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift', 'Sources/**', 'Tests/**') }}
          restore-keys: spm-${{ runner.os }}-
      - name: Toolchain versions
        run: swift --version
      - name: Test
        run: swift test

  # Catches breakage that only shows up in the real .app bundle
  # (Info.plist, asset catalog, entitlements) which `swift build` never touches.
  xcode-build:
    name: xcodegen & xcodebuild
    runs-on: macos-15
    timeout-minutes: 20
    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1
    steps:
      - uses: actions/checkout@v7
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build app bundle (unsigned)
        run: |
          xcodebuild build \
            -project Pelmet.xcodeproj \
            -scheme Pelmet \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO
      - name: Verify bundled changelog
        run: |
          APP="$PWD/build/Build/Products/Debug/Pelmet.app"
          test -s "$APP/Contents/Resources/CHANGELOG.md"
